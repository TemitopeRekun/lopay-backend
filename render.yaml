version: "1"

databases:
  - name: "lopay db"
    databaseName: lopay-db
    user: lopay
    plan: free

services:
  - type: web
    name: lopay-backend
    env: node
    plan: free
    buildCommand: npm ci && npm run migrate:deploy && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: "lopay db"
          property: connectionString
      - key: JWT_SECRET
        value: REPLACE_ME
      - key: FIREBASE_PROJECT_ID
        value: REPLACE_ME
      - key: FIREBASE_CLIENT_EMAIL
        value: REPLACE_ME
      - key: FIREBASE_PRIVATE_KEY
        value: REPLACE_ME
      - key: SUPABASE_URL
        value: REPLACE_ME
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: REPLACE_ME
      - key: SUPABASE_STORAGE_BUCKET
        value: REPLACE_ME
      - key: SUPABASE_SIGNED_URL_TTL_SECONDS
        value: "600"
      - key: ADMIN_EMAIL
        value: REPLACE_ME
      - key: ADMIN_PASSWORD
        value: REPLACE_ME
      - key: CORS_ORIGINS
        value: ""
